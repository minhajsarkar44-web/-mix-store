<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MiX Store Pro | Ultimate Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { background: #020617; color: #f8fafc; font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
        .glass-card { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .sidebar-active { transform: translateX(0) !important; }
        .cyber-btn { background: linear-gradient(135deg, #4f46e5 0%, #9333ea 100%); transition: 0.3s; }
        .cyber-btn:active { transform: scale(0.95); opacity: 0.8; }
        .app-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
        @media (min-width: 768px) { .app-grid { grid-template-columns: repeat(4, 1fr); } }
    </style>
</head>
<body class="pb-24">

    <nav class="sticky top-0 z-40 glass-card px-5 py-4 flex justify-between items-center border-b border-white/5">
        <div class="flex items-center gap-4">
            <button onclick="toggleSide()" class="text-xl p-2"><i class="fa-solid fa-bars-staggered"></i></button>
            <h1 class="text-xl font-extrabold tracking-tighter">MiX <span class="text-indigo-500">STORE</span></h1>
        </div>
        <div id="user-p" onclick="openLogin()" class="w-10 h-10 rounded-full bg-slate-800 flex items-center justify-center border border-indigo-500/30">
            <i class="fa-solid fa-user text-sm"></i>
        </div>
    </nav>

    <div id="side-overlay" onclick="toggleSide()" class="fixed inset-0 bg-black/60 z-50 hidden backdrop-blur-sm"></div>
    <aside id="sidebar" class="fixed top-0 left-0 h-full w-72 glass-card z-[51] -translate-x-full transition-transform duration-300 p-6 flex flex-col">
        <div class="flex justify-between items-center mb-10">
            <h2 class="font-bold text-indigo-400">MENU</h2>
            <button onclick="toggleSide()"><i class="fa-solid fa-xmark text-xl"></i></button>
        </div>
        <div class="flex flex-col gap-4 flex-1">
            <button onclick="loadHome()" class="flex items-center gap-4 p-4 rounded-2xl bg-indigo-500/10 text-indigo-400 font-bold"><i class="fa-solid fa-house"></i> Home</button>
            <button class="flex items-center gap-4 p-4 rounded-2xl hover:bg-white/5 transition"><i class="fa-solid fa-layer-group"></i> Categories</button>
            <button class="flex items-center gap-4 p-4 rounded-2xl hover:bg-white/5 transition"><i class="fa-solid fa-shield-halved"></i> Modded Apps</button>
            <button class="flex items-center gap-4 p-4 rounded-2xl hover:bg-white/5 transition"><i class="fa-solid fa-cloud-arrow-down"></i> Updates</button>
        </div>
        <p class="text-[10px] text-gray-600 text-center">Version 2.0.1 Stable</p>
    </aside>

    <main class="p-5 max-w-5xl mx-auto">
        <div class="mb-8">
            <h2 id="main-title" class="text-3xl font-extrabold tracking-tight mb-1">Loading...</h2>
            <p id="sub-title" class="text-gray-500 text-sm italic">Connect to server...</p>
        </div>

        <div class="relative mb-8">
            <i class="fa-solid fa-magnifying-glass absolute left-4 top-4 text-gray-500"></i>
            <input type="text" onkeyup="search(this.value)" placeholder="Search premium apps..." class="w-full bg-slate-900 border border-slate-800 rounded-2xl py-4 pl-12 pr-4 focus:outline-none focus:border-indigo-500 transition-all">
        </div>

        <div id="app-grid" class="app-grid"></div>
    </main>

    <div id="login-m" class="fixed inset-0 z-[60] bg-black/90 flex items-center justify-center p-6 hidden">
        <div class="glass-card w-full max-w-sm p-8 rounded-[2.5rem] border-indigo-500/20 text-center">
            <h3 class="text-2xl font-black mb-6">LOGIN</h3>
            <div id="email-box">
                <input type="email" id="email-in" placeholder="Email Address" class="w-full bg-slate-800 rounded-2xl p-4 mb-4 text-center border border-white/5">
                <button onclick="sendOTP()" id="s-otp" class="cyber-btn w-full py-4 rounded-2xl font-bold">SEND OTP</button>
            </div>
            <div id="otp-box" class="hidden">
                <input type="text" id="otp-in" placeholder="6-Digit OTP" class="w-full bg-slate-800 rounded-2xl p-4 mb-4 text-center tracking-[0.5em] text-xl font-bold">
                <button onclick="verifyOTP()" class="bg-white text-black w-full py-4 rounded-2xl font-bold">VERIFY</button>
            </div>
            <button onclick="openLogin()" class="mt-6 text-gray-500 text-xs">CLOSE</button>
        </div>
    </div>

    <div class="fixed bottom-0 left-0 w-full glass-card border-t border-white/5 flex justify-around py-4 z-40 rounded-t-3xl">
        <button onclick="loadHome()" class="flex flex-col items-center gap-1 text-indigo-500"><i class="fa-solid fa-house"></i><span class="text-[9px] font-bold">HOME</span></button>
        <button class="flex flex-col items-center gap-1 text-gray-500"><i class="fa-solid fa-shapes"></i><span class="text-[9px] font-bold">APPS</span></button>
        <button class="flex flex-col items-center gap-1 text-gray-500"><i class="fa-solid fa-bolt"></i><span class="text-[9px] font-bold">MODS</span></button>
        <button onclick="openLogin()" class="flex flex-col items-center gap-1 text-gray-500"><i class="fa-solid fa-user"></i><span class="text-[9px] font-bold">ME</span></button>
    </div>

    <script>
        let apps = [];
        let userEmail = "";

        // UI Helpers
        function toggleSide() { 
            document.getElementById('sidebar').classList.toggle('sidebar-active');
            document.getElementById('side-overlay').classList.toggle('hidden');
        }
        function openLogin() { document.getElementById('login-m').classList.toggle('hidden'); }

        // Core Functions
        async function fetchStore() {
            const res = await fetch('/api/data');
            const data = await res.json();
            apps = data.apps;
            document.getElementById('main-title').innerText = data.store_config.section_title;
            document.getElementById('sub-title').innerText = data.store_config.sub_title;
            render(apps);
        }

        function render(data) {
            const grid = document.getElementById('app-grid');
            grid.innerHTML = data.map(a => `
                <div class="glass-card p-4 rounded-3xl flex flex-col items-center text-center animate-fade-in">
                    <img src="${a.img}" class="w-20 h-20 rounded-2xl mb-4 object-cover shadow-xl">
                    <h4 class="text-sm font-bold truncate w-full">${a.name}</h4>
                    <p class="text-[10px] text-gray-500 mb-4">${a.size}</p>
                    <button onclick="dl('${a.link}')" class="w-full py-3 rounded-xl bg-white/5 border border-white/5 text-[10px] font-black hover:bg-indigo-600 transition-all">DOWNLOAD</button>
                </div>
            `).join('');
        }

        function search(q) {
            const f = apps.filter(a => a.name.toLowerCase().includes(q.toLowerCase()));
            render(f);
        }

        function dl(url) {
            Swal.fire({ title: 'Processing', text: 'Securing download link...', timer: 1500, showConfirmButton: false, willOpen: () => Swal.showLoading(), background: '#020617', color: '#fff' });
            setTimeout(() => { window.location.href = url; }, 1600);
        }

        // OTP Auth
        async function sendOTP() {
            userEmail = document.getElementById('email-in').value;
            const btn = document.getElementById('s-otp');
            btn.innerText = "SENDING...";
            const res = await fetch(`/api/proxy/send?email=${userEmail}`);
            if(res.ok) {
                document.getElementById('email-box').classList.add('hidden');
                document.getElementById('otp-box').classList.remove('hidden');
                Swal.fire('OTP Sent', 'Check your email inbox', 'success');
            }
        }

        async function verifyOTP() {
            const otp = document.getElementById('otp-in').value;
            const res = await fetch(`/api/proxy/verify?email=${userEmail}&otp=${otp}`);
            if(res.ok) {
                localStorage.setItem('auth', 'true');
                location.reload();
            } else {
                Swal.fire('Error', 'Invalid OTP', 'error');
            }
        }

        window.onload = () => {
            fetchStore();
            if(localStorage.getItem('auth') === 'true') {
                document.getElementById('user-p').innerHTML = '<i class="fa-solid fa-check text-green-500"></i>';
            }
        };
    </script>
</body>
</html>
