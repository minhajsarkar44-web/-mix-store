<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MiX Store Pro | Premium APK Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { background: #010409; color: #E6EDF3; font-family: 'Plus Jakarta Sans', sans-serif; overflow-x: hidden; }
        .glass-nav { background: rgba(1, 4, 9, 0.8); backdrop-filter: blur(20px); border-bottom: 1px solid rgba(255,255,255,0.05); }
        .app-card { background: #0d1117; border: 1px solid #30363d; border-radius: 24px; transition: 0.3s; padding: 20px; text-align: center; }
        .app-card:active { transform: scale(0.95); background: #161b22; }
        .cyber-btn { background: linear-gradient(135deg, #38bdf8 0%, #818cf8 100%); color: #000; font-weight: 800; border-radius: 12px; }
        .shimmer { background: linear-gradient(90deg, #0d1117 25%, #161b22 50%, #0d1117 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; }
        @keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
        .modal-bg { background: rgba(0,0,0,0.95); backdrop-blur: 10px; }
    </style>
</head>
<body class="pb-24">

    <nav class="glass-nav sticky top-0 z-50 px-6 py-5 flex justify-between items-center">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 cyber-btn flex items-center justify-center rounded-xl shadow-[0_0_15px_rgba(56,189,248,0.4)]">
                <i class="fa-solid fa-bolt-lightning text-lg"></i>
            </div>
            <h1 class="text-2xl font-black tracking-tighter italic">MiX<span class="text-sky-400">PRO</span></h1>
        </div>
        <div onclick="openAuth()" id="p-icon" class="w-11 h-11 rounded-2xl bg-[#161b22] border border-[#30363d] flex items-center justify-center cursor-pointer">
            <i class="fa-solid fa-user-ninja text-gray-400"></i>
        </div>
    </nav>

    <header class="px-6 pt-8 pb-4">
        <h2 id="main-title" class="text-4xl font-extrabold tracking-tight mb-2 shimmer-text">Premium Hub</h2>
        <p id="sub-title" class="text-gray-500 font-medium">Downloading excellence, one APK at a time.</p>
    </header>

    <div class="px-6 mb-8">
        <div class="relative group">
            <i class="fa-solid fa-magnifying-glass absolute left-5 top-1/2 -translate-y-1/2 text-gray-600"></i>
            <input type="text" onkeyup="filterApps(this.value)" placeholder="Search 5,000+ premium mods..." class="w-full bg-[#0d1117] border border-[#30363d] rounded-2xl py-4.5 pl-14 pr-6 focus:outline-none focus:border-sky-500/50 transition-all font-semibold">
        </div>
    </div>

    <div id="grid" class="grid grid-cols-2 md:grid-cols-4 gap-4 px-6">
        <div class="shimmer h-48 rounded-3xl"></div>
        <div class="shimmer h-48 rounded-3xl"></div>
    </div>

    <div id="auth-modal" class="fixed inset-0 z-[100] modal-bg flex items-center justify-center p-6 hidden">
        <div class="bg-[#0d1117] w-full max-w-sm p-10 rounded-[40px] border border-[#30363d] shadow-2xl relative">
            <button onclick="openAuth()" class="absolute top-6 right-8 text-gray-500 text-xl"><i class="fa-solid fa-xmark"></i></button>
            <div class="text-center mb-8">
                <h3 class="text-3xl font-black italic mb-2">ACCESS<span class="text-sky-400">MiX</span></h3>
                <p class="text-gray-500 text-sm">Enter your credentials to unlock VIP.</p>
            </div>
            
            <div id="email-step">
                <input type="email" id="u-email" placeholder="official@gmail.com" class="w-full bg-[#161b22] border border-[#30363d] rounded-2xl p-5 mb-5 text-center font-bold focus:outline-none focus:border-sky-500">
                <button onclick="sendOTP()" id="s-btn" class="cyber-btn w-full py-5 text-black tracking-widest uppercase">GET ACCESS KEY</button>
            </div>

            <div id="otp-step" class="hidden">
                <input type="text" id="u-otp" placeholder="••••••" class="w-full bg-[#161b22] border border-[#30363d] rounded-2xl p-5 mb-5 text-center text-3xl font-black tracking-[0.5em] focus:outline-none">
                <button onclick="verifyOTP()" class="bg-white text-black w-full py-5 rounded-2xl font-black tracking-widest uppercase">VERIFY VIP</button>
            </div>
        </div>
    </div>

    <div class="fixed bottom-0 left-0 w-full glass-nav border-t border-white/5 flex justify-around py-5 z-40 rounded-t-[35px]">
        <button onclick="location.reload()" class="text-sky-400 flex flex-col items-center gap-1"><i class="fa-solid fa-house-chimney text-xl"></i><span class="text-[9px] font-extrabold uppercase tracking-tighter">Home</span></button>
        <button class="text-gray-600 flex flex-col items-center gap-1"><i class="fa-solid fa-fire-flame-curved text-xl"></i><span class="text-[9px] font-extrabold">Trending</span></button>
        <button class="text-gray-600 flex flex-col items-center gap-1"><i class="fa-solid fa-compass text-xl"></i><span class="text-[9px] font-extrabold">Explore</span></button>
        <button onclick="openAuth()" class="text-gray-600 flex flex-col items-center gap-1"><i class="fa-solid fa-crown text-xl"></i><span class="text-[9px] font-extrabold">VIP</span></button>
    </div>

    <script>
        let fullApps = [];
        let sessionEmail = "";

        function openAuth() { document.getElementById('auth-modal').classList.toggle('hidden'); }

        async function initStore() {
            try {
                const res = await fetch('/api/data');
                const data = await res.json();
                fullApps = data.apps;
                document.getElementById('main-title').innerText = data.store_config.section_title;
                document.getElementById('sub-title').innerText = data.store_config.sub_title;
                renderApps(fullApps);
                if(localStorage.getItem('mix_vip')) {
                    document.getElementById('p-icon').innerHTML = '<i class="fa-solid fa-crown text-yellow-500"></i>';
                }
            } catch (e) {
                document.getElementById('grid').innerHTML = '<p class="col-span-2 text-center text-red-500 font-bold p-10">ERROR: Connect Admin Panel to Supabase!</p>';
            }
        }

        function renderApps(list) {
            const grid = document.getElementById('grid');
            grid.innerHTML = list.map(a => `
                <div class="app-card">
                    <img src="${a.img}" class="w-24 h-24 mx-auto rounded-[30px] mb-5 object-cover shadow-2xl border border-white/5">
                    <h4 class="text-sm font-extrabold truncate px-2">${a.name}</h4>
                    <p class="text-[10px] text-sky-400 font-black mb-5 uppercase tracking-widest mt-1">${a.size}</p>
                    <button onclick="downloadLink('${a.link}', '${a.name}')" class="w-full py-3.5 rounded-xl bg-[#161b22] border border-[#30363d] text-[10px] font-black tracking-widest hover:bg-white hover:text-black transition-all">GET</button>
                </div>
            `).join('');
        }

        function downloadLink(url, name) {
            Swal.fire({
                title: 'Verifying Link...',
                text: `Fetching secure node for ${name}`,
                timer: 1800,
                showConfirmButton: false,
                background: '#0d1117',
                color: '#fff',
                didOpen: () => Swal.showLoading()
            }).then(() => { window.location.href = url; });
        }

        function filterApps(q) {
            const filtered = fullApps.filter(a => a.name.toLowerCase().includes(q.toLowerCase()));
            renderApps(filtered);
        }

        async function sendOTP() {
            sessionEmail = document.getElementById('u-email').value;
            if(!sessionEmail) return;
            const btn = document.getElementById('s-btn');
            btn.innerText = "REQUESTING ACCESS...";
            const res = await fetch(`/api/proxy/send?email=${sessionEmail}`);
            if(res.ok) {
                document.getElementById('email-step').classList.add('hidden');
                document.getElementById('otp-step').classList.remove('hidden');
                Swal.fire({ title: 'ACCESS KEY SENT', icon: 'success', background: '#0d1117', color: '#fff' });
            }
        }

        async function verifyOTP() {
            const otp = document.getElementById('u-otp').value;
            const res = await fetch(`/api/proxy/verify?email=${sessionEmail}&otp=${otp}`);
            if(res.ok) {
                localStorage.setItem('mix_vip', 'true');
                location.reload();
            } else {
                Swal.fire({ title: 'INVALID KEY', icon: 'error', background: '#0d1117' });
            }
        }

        window.onload = initStore;
    </script>
</body>
</html>
