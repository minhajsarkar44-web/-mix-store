<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="site-title">MiX Store</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #0F172A; color: white; font-family: 'Inter', sans-serif; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .cyber-btn { background: linear-gradient(90deg, #4F46E5 0%, #7C3AED 100%); }
        .loader { border-top-color: #4F46E5; animation: spinner 1.5s linear infinite; }
        @keyframes spinner { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="m-status" class="hidden bg-red-600 text-white text-center py-2 text-sm font-bold"></div>

    <nav class="glass sticky top-0 z-50 px-6 py-4 flex justify-between items-center">
        <h1 id="brand-name" class="text-2xl font-black tracking-tighter text-indigo-500">MiX <span class="text-white">STORE</span></h1>
        <div class="flex gap-4">
            <i class="fas fa-search text-gray-400 cursor-pointer"></i>
            <i class="fas fa-bars text-gray-400 cursor-pointer"></i>
        </div>
    </nav>

    <header class="container mx-auto px-6 py-12 text-center">
        <h2 id="main-section-name" class="text-4xl md:text-5xl font-extrabold mb-3">Loading...</h2>
        <p id="sub-section-name" class="text-gray-400 text-lg"></p>
    </header>

    <main class="container mx-auto px-6 pb-20">
        <div id="app-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
            </div>
    </main>

    <footer class="glass mt-10 py-8 text-center text-gray-500">
        <p id="footer-credit"></p>
    </footer>

    <script>
        // আপনার Vercel এপিআই লিঙ্ক এখানে দিন
        const API_URL = "/api/data"; 

        async function initStore() {
            try {
                const res = await fetch(API_URL);
                const data = await res.json();

                // ১. কনফিগারেশন সেটআপ
                document.getElementById('site-title').innerText = data.store_config.app_name;
                document.getElementById('brand-name').innerHTML = data.store_config.app_name.replace(" ", " <span class='text-white'>") + "</span>";
                document.getElementById('main-section-name').innerText = data.store_config.section_title;
                document.getElementById('sub-section-name').innerText = data.store_config.sub_title;
                document.getElementById('footer-credit').innerText = data.store_config.footer_text;

                // ২. মেইনটেন্যান্স চেক
                if(data.maintenance.is_active) {
                    const mBox = document.getElementById('m-status');
                    mBox.innerText = "⚠️ " + data.maintenance.message;
                    mBox.classList.remove('hidden');
                }

                // ৩. অ্যাপ রেন্ডারিং
                const grid = document.getElementById('app-grid');
                grid.innerHTML = "";
                
                if(data.apps.length === 0) {
                    grid.innerHTML = "<p class='col-span-full text-center text-gray-600'>No apps available right now.</p>";
                }

                data.apps.forEach(app => {
                    grid.innerHTML += `
                        <div class="glass p-5 rounded-3xl border border-slate-800 hover:border-indigo-500 transition duration-300">
                            <img src="${app.img}" class="w-20 h-20 rounded-2xl mb-4 shadow-xl mx-auto" onerror="this.src='https://cdn-icons-png.flaticon.com/512/2589/2589174.png'">
                            <h4 class="text-center font-bold text-lg">${app.name}</h4>
                            <p class="text-center text-xs text-gray-500 mb-4">v${app.version} | ${app.size}</p>
                            <a href="${app.link}" target="_blank" class="cyber-btn block text-center py-3 rounded-xl font-bold text-sm shadow-lg shadow-indigo-500/30">
                                DOWNLOAD
                            </a>
                        </div>
                    `;
                });

            } catch (e) {
                console.log("Error loading MiX Store");
            }
        }
        window.onload = initStore;
    </script>
</body>
</html>
