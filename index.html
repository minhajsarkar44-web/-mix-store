<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MiX Store Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        body { background: #020617; color: #f8fafc; font-family: sans-serif; }
        .glass { background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
        .app-card { background: #0f172a; border-radius: 20px; padding: 15px; border: 1px solid #1e293b; text-align: center; }
    </style>
</head>
<body class="pb-20">

    <nav class="glass sticky top-0 z-50 p-4 flex justify-between items-center">
        <h1 class="font-black text-xl tracking-tighter">MiX <span class="text-indigo-500">STORE</span></h1>
        <div onclick="openLogin()" id="user-icon" class="w-10 h-10 rounded-full bg-slate-800 flex items-center justify-center border border-indigo-500">
            <i class="fa-solid fa-user text-xs"></i>
        </div>
    </nav>

    <div class="p-6">
        <h2 id="title" class="text-2xl font-bold mb-1">Loading Store...</h2>
        <p id="desc" class="text-gray-500 text-xs mb-6">Connecting to database</p>
        
        <div id="grid" class="grid grid-cols-2 gap-4">
            </div>
    </div>

    <div id="login-modal" class="fixed inset-0 z-[100] bg-black/90 flex items-center justify-center p-6 hidden">
        <div class="glass w-full max-w-xs p-8 rounded-[30px] text-center">
            <h3 class="text-xl font-bold mb-6">MEMBER LOGIN</h3>
            
            <div id="step-1">
                <input type="email" id="email" placeholder="Enter Gmail" class="w-full bg-slate-900 border border-slate-700 rounded-xl p-4 mb-4 text-center">
                <button onclick="sendOTP()" id="s-btn" class="w-full py-4 bg-indigo-600 rounded-xl font-bold">SEND OTP</button>
            </div>

            <div id="step-2" class="hidden">
                <input type="text" id="otp" placeholder="Enter OTP" class="w-full bg-slate-900 border border-slate-700 rounded-xl p-4 mb-4 text-center tracking-widest font-bold">
                <button onclick="verifyOTP()" class="w-full py-4 bg-green-600 rounded-xl font-bold">VERIFY & ENTER</button>
            </div>
            
            <button onclick="openLogin()" class="mt-6 text-gray-500 text-xs uppercase">Close</button>
        </div>
    </div>

    <script>
        let storeData = [];

        function openLogin() { document.getElementById('login-modal').classList.toggle('hidden'); }

        async function loadStore() {
            try {
                const res = await fetch('/api/data');
                const data = await res.json();
                document.getElementById('title').innerText = data.store_config.section_title;
                document.getElementById('desc').innerText = data.store_config.sub_title;
                render(data.apps);
            } catch(e) { document.getElementById('title').innerText = "Update Required!"; }
        }

        function render(apps) {
            const g = document.getElementById('grid');
            g.innerHTML = apps.map(a => `
                <div class="app-card">
                    <img src="${a.img}" class="w-16 h-16 mx-auto rounded-xl mb-3 object-cover">
                    <h4 class="text-xs font-bold truncate">${a.name}</h4>
                    <p class="text-[10px] text-gray-500 mb-3">${a.size}</p>
                    <button onclick="location.href='${a.link}'" class="w-full py-2 bg-indigo-500/10 text-indigo-400 rounded-lg text-[10px] font-bold border border-indigo-500/20">GET</button>
                </div>
            `).join('');
        }

        async function sendOTP() {
            const e = document.getElementById('email').value;
            if(!e) return;
            document.getElementById('s-btn').innerText = "SENDING...";
            const res = await fetch(`/api/proxy/send?email=${e}`);
            if(res.ok) {
                document.getElementById('step-1').classList.add('hidden');
                document.getElementById('step-2').classList.remove('hidden');
                Swal.fire('Success', 'Check your email for OTP', 'success');
            }
        }

        async function verifyOTP() {
            const e = document.getElementById('email').value;
            const o = document.getElementById('otp').value;
            const res = await fetch(`/api/proxy/verify?email=${e}&otp=${o}`);
            if(res.ok) {
                localStorage.setItem('user', 'true');
                location.reload();
            } else {
                Swal.fire('Error', 'Wrong OTP', 'error');
            }
        }

        window.onload = loadStore;
    </script>
</body>
</html>
